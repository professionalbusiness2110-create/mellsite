<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080B14;
    --surface: #111827;
    --card: #161D2E;
    --accent: #FF6B35;
    --accent-soft: rgba(255, 107, 53, 0.12);
    --text: #F0EEE9;
    --muted: #8B9BB4;
    --border: rgba(255,255,255,0.07);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 420px;
    text-align: center;
  }

  .avatar-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 1.25rem;
  }

  .avatar {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    object-fit: cover;
    display: block;
    border: 3px solid var(--accent);
  }

  .avatar-placeholder {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: var(--surface);
    border: 3px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
    color: var(--muted);
    margin: 0 auto;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(1.15); }
  }

  .live-badge {
    position: absolute;
    bottom: 4px;
    right: 4px;
    background: #E53535;
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 2px 7px;
    border-radius: 99px;
    border: 2px solid var(--card);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .live-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #fff;
    animation: pulse 1.5s ease-in-out infinite;
    flex-shrink: 0;
  }

  h1 {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.4rem;
  }

  .username {
    font-size: 0.95rem;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 0.75rem;
  }

  .bio {
    font-size: 0.9rem;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 2rem;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 18px;
    color: var(--text);
    text-decoration: none;
    font-size: 0.95rem;
    font-weight: 600;
    font-family: 'Outfit', system-ui, sans-serif;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
  }

  .link-btn:hover {
    background: var(--accent-soft);
    border-color: var(--accent);
    transform: translateY(-1px);
  }

  .link-btn:active { transform: translateY(0); }

  .btn-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .btn-icon svg { width: 20px; height: 20px; }

  .btn-label { flex: 1; text-align: left; }

  .btn-sub {
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 400;
    margin-top: 1px;
  }

  .arrow { color: var(--muted); font-size: 18px; flex-shrink: 0; }

  .divider {
    width: 40px;
    height: 1px;
    background: var(--border);
    margin: 1.5rem auto;
  }

  .footer { font-size: 0.75rem; color: var(--muted); opacity: 0.6; }
</style>
</head>
